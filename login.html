<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow"> <!-- Evitar indexación en Google -->
    <title>Login Admin | Asbe Ziad</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <!-- Reusamos estilos base -->
    <style>
        body {
            background-color: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: white;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-logo {
            width: 150px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            font-family: 'Lato', sans-serif;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #1a1a1a;
        }
        .error-msg {
            color: #d9534f;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- Puedes cambiar src="logo.svg" si ya lo tienes -->
        <img src="logo.svg" alt="Asbe Ziad" class="login-logo"> 
        <h2>Acceso Privado</h2>
        
        <p class="error-msg" id="errorMsg">Usuario o contraseña incorrectos</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="admin" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
        </form>
        
        <div style="margin-top: 20px;">
            <a href="index.html" style="font-size: 0.8rem; color: #888;">&larr; Volver al sitio web</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Redirigir si ya está logueado
        if (sessionStorage.getItem('joyeria_admin_session')) {
            window.location.href = 'admin.html';
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if (Auth.login(u, p)) {
                window.location.href = 'admin.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
